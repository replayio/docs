title: 'Replay.io'
description: 'Replay.io is a tool that makes debugging easy. It lets you record your web app and retroactively inspect it using print statements and browser DevTools.'
navigation: false
hero:
  title: 'Replay Docs'
  description: 'Create your documentation in seconds with this template!'
  orientation: horizontal
  links:
    - label: 'Getting started'
      icon: 'i-heroicons-rocket-launch'
      to: '/getting-started'
      size: lg
    - label: 'Debugging guide'
      icon: 'i-ic-outline-bug-report'
      color: 'white'
      to: 'debugging-guide'
      size: lg
  code: |
    ```bash [Terminal]
    npm install @replayio/replay -g
    ```
features:
  title: 'All-in-one docs template'
  links:
    - label: 'Explore Nuxt UI Pro'
      icon: 'i-simple-icons-nuxtdotjs'
      trailingIcon: 'i-heroicons-arrow-right-20-solid'
      color: 'gray'
      to: 'https://ui.nuxt.com/pro'
      target: '_blank'
      size: lg
  items:
    - title: 'Nuxt 3'
      description: 'Powered by Nuxt 3 for optimal performances and SEO.'
      icon: 'i-simple-icons-nuxtdotjs'
      to: 'https://nuxt.com'
      target: '_blank'
    - title: 'Markdown'
      description: 'Write your pages with MDC thanks to Nuxt Content.'
